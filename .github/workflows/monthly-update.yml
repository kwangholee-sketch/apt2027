name: Monthly Apartment Data Update

on:
  schedule:
    - cron: '0 0 1 * *'   # 매월 1일 00:00 UTC (= 오전 9시 KST)
  workflow_dispatch:        # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data from asil.kr
        run: node scrape_asil.js
        # ⚠️  scrape_asil.js 상단의 ASIL_ENDPOINT를 설정해야 이 단계가 작동합니다.
        # 설정 전까지는 아래 continue-on-error: true 로 두면 기존 데이터로 진행됩니다.
        continue-on-error: true

      - name: Rebuild ceiling data (신규 단지 추가, 기존 확인 데이터 유지)
        run: node gen_ceiling_data.js

      - name: Build HTML
        run: node build_html.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 전국_아파트_입주물량_2027.html apt_list.txt asil_2027_raw.csv ceiling_data.json
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "Monthly update: $(date +'%Y년 %m월')"
            git push
          fi
